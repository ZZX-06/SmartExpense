name: Build iOS App

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    name: Build IPA
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: List project info
        run: |
          xcodebuild -list -project SmartExpense.xcodeproj

      - name: Build
        run: |
          xcodebuild \
            -project SmartExpense.xcodeproj \
            -target SmartExpense \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            PROVISIONING_PROFILE_SPECIFIER="" \
            DEVELOPMENT_TEAM="" \
            SWIFT_VERSION=5.0 \
            build 2>&1 | tail -50

      - name: Package IPA
        run: |
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "SmartExpense.app" -path "*/Release-iphoneos/*" -type d 2>/dev/null | head -1)
          echo "App at: $APP_PATH"
          if [ -n "$APP_PATH" ] && [ -d "$APP_PATH" ]; then
            mkdir -p Payload
            cp -R "$APP_PATH" Payload/
            zip -r SmartExpense.ipa Payload/
            echo "IPA created: $(ls -la SmartExpense.ipa)"
          else
            echo "Searching for app..."
            find ~/Library/Developer/Xcode/DerivedData -name "SmartExpense.app" -type d 2>/dev/null
          fi

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: SmartExpense-IPA
          path: SmartExpense.ipa
        continue-on-error: true