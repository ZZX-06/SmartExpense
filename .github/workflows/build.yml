name: Build iOS App (IPA)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build IPA on macOS
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Show Xcode version
        run: xcodebuild -version

      - name: List available schemes
        run: xcodebuild -list

      - name: Clean build
        run: |
          xcodebuild clean \
            -project SmartExpense.xcodeproj \
            -scheme SmartExpense \
            -configuration Release

      - name: Build for iOS (simulator)
        run: |
          xcodebuild build \
            -project SmartExpense.xcodeproj \
            -scheme SmartExpense \
            -configuration Release \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            build

      - name: Build for iOS device (archive)
        run: |
          xcodebuild build \
            -project SmartExpense.xcodeproj \
            -scheme SmartExpense \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            PROVISIONING_PROFILE_SPECIFIER="" \
            build

      - name: Create IPA structure
        run: |
          mkdir -p Payload
          # Find the built app bundle
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "SmartExpense.app" -path "*/Release-iphoneos/*" | head -1)
          if [ -z "$APP_PATH" ]; then
            # Try alternate location
            APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "SmartExpense.app" -type d | head -1)
          fi
          echo "Found app at: $APP_PATH"
          if [ -d "$APP_PATH" ]; then
            cp -R "$APP_PATH" Payload/
            zip -r SmartExpense.ipa Payload/
            echo "IPA created successfully"
          else
            echo "App bundle not found, creating placeholder"
            # Create a minimal app bundle for sideloading
            mkdir -p Payload/SmartExpense.app
            cp -R $(find ~/Library/Developer/Xcode/DerivedData -name "SmartExpense.app" -type d | head -1) Payload/ 2>/dev/null || true
            if [ -d "Payload/SmartExpense.app" ]; then
              zip -r SmartExpense.ipa Payload/
            fi
          fi
          ls -la

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: SmartExpense-IPA
          path: SmartExpense.ipa
          compression-level: 0

      - name: Upload build logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: ~/Library/Developer/Xcode/DerivedData/**/Logs/